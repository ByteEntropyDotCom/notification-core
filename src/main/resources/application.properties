# ===============================================================
# Basic Application Settings
# ===============================================================
spring.application.name=notification-core
server.port=8080

# ===============================================================
# Java 21 Virtual Threads (The Performance Engine)
# ===============================================================
# Enables Virtual Threads for both Tomcat (HTTP) and @Async tasks
spring.threads.virtual.enabled=true

# ===============================================================
# Resilience4j Retry Configuration
# ===============================================================
# Logic: Try 3 times. Wait 2s, then 4s, then 8s (Exponential).
resilience4j.retry.instances.notificationRetry.max-attempts=3
resilience4j.retry.instances.notificationRetry.wait-duration=2s
resilience4j.retry.instances.notificationRetry.enable-exponential-backoff=true
resilience4j.retry.instances.notificationRetry.exponential-backoff-multiplier=2

# ===============================================================
# Idempotency & Cache (Redis)
# ===============================================================
# If using Upstash/Redis Cloud, replace localhost with your cloud endpoint
spring.data.redis.host=redis-10101.c10.us-east-1-3.ec2.cloud.redislabs.com
spring.data.redis.port=10101
spring.data.redis.password=xCKiktlRJsHQtimm2YY2fgQcomEHQxxi


# Lettuce is the non-blocking driver recommended for Virtual Threads
spring.data.redis.client-type=lettuce

# SSL is REQUIRED for most Cloud Redis providers (set to true for Cloud)
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# Connection timeout: prevents the app from hanging if the cloud is slow
spring.data.redis.timeout=5000
spring.data.redis.repositories.enabled=false

# ===============================================================
# Persistence & DLQ (Database)
# ===============================================================
# H2 File-based DB for the Dead Letter Queue (DLQ)
spring.datasource.url=jdbc:h2:file:./data/notificationdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Database Connection Pool Tuning for Virtual Threads
# Allows for bursts of concurrent writes to the DLQ
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ===============================================================
# Observability & Logging
# ===============================================================
# Expose metrics for Prometheus/Grafana monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Log Pattern: Includes Trace IDs to track requests across Async threads
logging.pattern.level=%5p [notification-core,%X{traceId:-},%X{spanId:-}]

# Set logging levels
logging.level.com.byteentropy.notification_core=DEBUG
logging.level.io.github.resilience4j=INFO