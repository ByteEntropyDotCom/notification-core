# ===============================================================
# Test-Specific Performance Tuning
# ===============================================================
# We want the tests to be fast. 10ms is perfect.
resilience4j.retry.instances.notificationRetry.max-attempts=3
resilience4j.retry.instances.notificationRetry.wait-duration=10ms
resilience4j.retry.instances.notificationRetry.enable-exponential-backoff=false
# This ensures Mockito's RuntimeExceptions are caught by the retry logic
resilience4j.retry.instances.notificationRetry.retry-exceptions=java.lang.RuntimeException

# ===============================================================
# In-Memory Database (Clean Slate for every test)
# ===============================================================
# Using mem:testdb ensures we don't write to your real ./data/ folder.
# DB_CLOSE_DELAY=-1 keeps the data alive as long as the ApplicationContext is active.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'create-drop' means tables are created when test starts and deleted when it ends.
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

# ===============================================================
# Infrastructure Mocks & Overrides
# ===============================================================
# Keep virtual threads enabled to ensure the async logic behaves like production
spring.threads.virtual.enabled=true

# Tell Spring not to fail if it can't connect to Redis on startup
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

spring.data.redis.repositories.enabled=false
spring.cache.type=none

# ===============================================================
# Logging for Debugging Tests
# ===============================================================
# This helps you see the retries happening in the console
logging.level.io.github.resilience4j=DEBUG
logging.level.com.byteentropy.notification_core=DEBUG