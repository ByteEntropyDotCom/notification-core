name: Notification Core CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  # 1. ADDED: Manual trigger from the "Actions" tab
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test with Maven
        run: mvn clean install

  docker-publish:
    needs: build-and-test
    # Run if on main branch OR if triggered manually
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to GHCR

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. UPDATED: Login to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. UPDATED: Push to GHCR
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags must be lowercase: ghcr.io/username/repository-name:latest
          tags: |
            ghcr.io/${{ github.repository_owner }}/notification-core:latest
            ghcr.io/${{ github.repository_owner }}/notification-core:${{ github.sha }}
